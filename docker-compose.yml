version: '2.1'
services:
  nodeodx-1:
    image: webodm/nodeodx
    container_name: nodeodx-1
    ports:
      - "3000"
    restart: on-failure:10
  clusterodx:
    image: webodm/clusterodx
    container_name: clusterodx
    ports:
      - "4000:3000"
      - "8080:8080"
      - "10000:10000"
    volumes:
      - ./docker/data:/var/www/data
    restart: on-failure:10
    depends_on:
      - nodeodx-1
